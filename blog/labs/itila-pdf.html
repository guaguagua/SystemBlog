<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!--
  blog-title: Information Theory, Inference, and Learning Algorithms
  blog-category: 参考书
  blog-summary: David MacKay 经典教材，系统覆盖信息论、贝叶斯推断、神经网络与机器学习算法，全书可免费获取。
  blog-date: 2026-06-27

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Information Theory, Inference, and Learning Algorithms — David MacKay</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --text: #1f2933;
      --muted: #64707d;
      --line: #d8dee8;
      --surface: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(135deg, rgba(15,118,110,0.10), transparent 34%),
                  linear-gradient(315deg, rgba(194,65,12,0.07), transparent 28%),
                  var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
    }

    header {
      padding: 14px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s;
      white-space: nowrap;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { flex-shrink: 0; }

    .header-meta {
      flex: 1;
    }
    .header-meta .eyebrow {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 2px;
    }
    .header-meta h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .header-meta .author {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .pdf-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      min-height: 0;
    }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: calc(100vh - 65px);
      display: block;
      background: #525659;
    }

    /* fallback message */
    .fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }
    .fallback svg { opacity: .35; }
  </style>
</head>
<body>
  <div data-site-header data-active="blog"></div>
  <script src="../../js/site-header.js"></script>

  <header>
    <a class="back-link" href="../../blog/">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      返回文章列表
    </a>

    <div class="header-meta">
      <p class="eyebrow">信息论 · 参考书</p>
      <h1>Information Theory, Inference, and Learning Algorithms</h1>
      <p class="author">David J.C. MacKay — Cambridge University Press</p>
    </div>

    <div class="actions">
      <a class="btn btn-outline" href="../assets/pdfs/Information Theory, Inference, and Learning Algorithms.pdf" target="_blank">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v9m0 0l-3-3m3 3l3-3M2 12v1.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        新标签打开
      </a>
      <a class="btn btn-primary" download href="../assets/pdfs/Information Theory, Inference, and Learning Algorithms.pdf">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v9m0 0l-3-3m3 3l3-3M2 12v1.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        下载 PDF
      </a>
    </div>
  </header>

  <div class="pdf-wrap">
    <iframe
      src="../assets/pdfs/Information Theory, Inference, and Learning Algorithms.pdf"
      title="Information Theory, Inference, and Learning Algorithms"
      allowfullscreen
    >
      <div class="fallback">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="8" y="4" width="28" height="36" rx="3" stroke="currentColor" stroke-width="2"/>
          <path d="M16 16h16M16 22h16M16 28h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>当前浏览器不支持内嵌 PDF 预览</p>
        <a class="btn btn-primary" href="../assets/pdfs/Information Theory, Inference, and Learning Algorithms.pdf" target="_blank">直接打开 PDF</a>
      </div>
    </iframe>
  </div>

  <div data-site-reward></div>
  <script src="../../js/site-reward.js"></script>

</body>
</html>
